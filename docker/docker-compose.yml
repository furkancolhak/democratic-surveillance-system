version: '3.8'

# This docker-compose file uses environment variables from ../.env (parent directory)
# Run from project root: docker-compose -f docker/docker-compose.yml up -d
# Or from docker directory: docker-compose --env-file ../.env up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: surveillance_db
    environment:
      POSTGRES_DB: surveillance_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    networks:
      - surveillance_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: surveillance_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/surveillance_db
      - MASTER_KEY_PATH=/app/secrets/master.key
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_EMAIL=${FROM_EMAIL}
      - BASE_URL=${BASE_URL}
    volumes:
      - ./encrypted_videos:/app/encrypted_videos
      - ./decrypted_videos:/app/decrypted_videos
      - ./violence_recordings:/app/violence_recordings
      - ./secrets:/app/secrets:ro
      - ./violence_detection_model2.keras:/app/violence_detection_model2.keras:ro
    ports:
      - "3333:3333"
    networks:
      - surveillance_network
    restart: unless-stopped
    command: gunicorn -w 4 -b 0.0.0.0:3333 --timeout 120 secure_voting_web:app

  nginx:
    image: nginx:alpine
    container_name: surveillance_nginx
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "443:443"
      - "80:80"
    networks:
      - surveillance_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  surveillance_network:
    driver: bridge
